spring.application.name=LumberyardBackend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lumberyard_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Onel@3444
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=MySuperSecretKeyForHS512AlgorithmThatIsAtLeast64BytesLongAndSecure
jwt.expiration=86400000

# Server Configuration
server.port=8080
